<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ushers - JAGOM Church Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#059669',
                        'primary-light': '#d1fae5',
                        'primary-dark': '#047857',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/ushers-register.css">
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <!-- Mobile Header -->
    <header class="lg:hidden fixed top-0 left-0 right-0 z-40 bg-white border-b border-gray-100 px-4 h-14 flex items-center justify-between">
        <button id="sidebarToggle" class="w-10 h-10 rounded-lg hover:bg-gray-100 flex items-center justify-center transition">
            <i class="fas fa-bars text-gray-600"></i>
        </button>
        <div class="flex items-center gap-2">
            <div id="mobileLogo" class="w-8 h-8 rounded-lg overflow-hidden">
                <img src="image/jagomlog.png" alt="JAGOM Logo" class="w-full h-full object-cover">
            </div>
            <span class="font-bold text-gray-900">JAGOM</span>
        </div>
        <div class="w-10"></div>
    </header>

    <!-- Overlay -->
    <div id="overlay" class="fixed inset-0 bg-black/40 z-40 hidden lg:hidden"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed left-0 top-0 h-full w-64 bg-white border-r border-gray-100 z-50 transform -translate-x-full lg:translate-x-0 transition-transform duration-300">
        <div class="flex flex-col h-full">
            <div class="p-5 border-b border-gray-50">
                <div class="flex items-center gap-3">
                    <div id="sidebarLogo" class="w-10 h-10 rounded-xl overflow-hidden cursor-pointer" title="Click to upload logo">
                        <img src="image/jagomlog.png" alt="JAGOM Logo" class="w-full h-full object-cover">
                    </div>
                    <div>
                        <h2 class="font-bold text-gray-900 text-sm">JAGOM</h2>
                        <p class="text-xs text-gray-400">Church Management</p>
                    </div>
                </div>
                <input type="file" id="logoUpload" accept="image/*" class="hidden">
            </div>
            <nav class="flex-1 p-3 space-y-1">
                <a href="dashboard.html" class="nav-item flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium transition">
                    <i class="fas fa-house w-5 text-center"></i><span>Home</span>
                </a>
                <a href="attendance.html" class="nav-item flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium transition">
                    <i class="fas fa-clipboard-check w-5 text-center"></i><span>Attendance</span>
                </a>
                <a href="ushers-register.html" class="nav-item active flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium transition">
                    <i class="fas fa-people-group w-5 text-center"></i><span>Ushers Register</span>
                </a>
                <a href="finance.html" class="nav-item flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium transition">
                    <i class="fas fa-money-bill-wave w-5 text-center"></i><span>Finance</span>
                </a>
                <a href="superadmin.html" class="nav-item flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium transition">
                    <i class="fas fa-shield-halved w-5 text-center"></i><span>Super Admin</span>
                </a>
            </nav>
            <div class="p-3 border-t border-gray-50">
                <button id="logoutBtn" class="nav-item flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium w-full text-left transition text-red-500 hover:bg-red-50">
                    <i class="fas fa-right-from-bracket w-5 text-center"></i><span>Logout</span>
                </button>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="lg:ml-64 pt-14 lg:pt-0 min-h-screen">
        <div class="hidden lg:flex items-center justify-between px-8 py-4 border-b border-gray-100 bg-white">
            <div>
                <h1 class="text-lg font-bold text-gray-900">Usher Report</h1>
                <p class="text-sm text-gray-400">Record service details and financial contributions</p>
            </div>
            <span class="text-xs font-medium px-3 py-1 rounded-full bg-primary/10 text-primary" id="roleBadge">Role</span>
        </div>

        <div class="p-4 sm:p-6 lg:p-8">
            <div class="max-w-4xl">
                <!-- Usher Form -->
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm">
                    <div class="p-5 border-b border-gray-50">
                        <h3 class="font-semibold text-gray-900"><i class="fas fa-file-lines text-primary mr-2"></i>Service Report Form</h3>
                    </div>
                    <form id="usherForm" class="p-5" novalidate>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                            <!-- Branch -->
                            <div>
                                <label class="block text-xs font-medium text-gray-500 mb-1.5">Select Branch <span class="text-red-400">*</span></label>
                                <div class="relative">
                                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><i class="fas fa-building text-xs"></i></span>
                                    <select id="usherBranch" required class="w-full pl-9 pr-4 py-2.5 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 focus:outline-none text-sm bg-gray-50 focus:bg-white appearance-none">
                                    </select>
                                    <span class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"><i class="fas fa-chevron-down text-xs"></i></span>
                                </div>
                            </div>

                            <!-- Date -->
                            <div>
                                <label class="block text-xs font-medium text-gray-500 mb-1.5">Date <span class="text-red-400">*</span></label>
                                <div class="relative">
                                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><i class="fas fa-calendar text-xs"></i></span>
                                    <input type="date" id="usherDate" required class="w-full pl-9 pr-4 py-2.5 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 focus:outline-none text-sm bg-gray-50 focus:bg-white">
                                </div>
                            </div>

                            <!-- Total Attendance -->
                            <div>
                                <label class="block text-xs font-medium text-gray-500 mb-1.5">Total Attendance <span class="text-red-400">*</span></label>
                                <div class="relative">
                                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><i class="fas fa-users text-xs"></i></span>
                                    <input type="number" id="usherAttendance" min="0" placeholder="0" required class="w-full pl-9 pr-4 py-2.5 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 focus:outline-none text-sm bg-gray-50 focus:bg-white">
                                </div>
                            </div>

                            <!-- Preacher -->
                            <div>
                                <label class="block text-xs font-medium text-gray-500 mb-1.5">Preacher <span class="text-red-400">*</span></label>
                                <div class="relative">
                                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><i class="fas fa-user text-xs"></i></span>
                                    <input type="text" id="usherPreacher" placeholder="Enter preacher's name" required class="w-full pl-9 pr-4 py-2.5 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 focus:outline-none text-sm bg-gray-50 focus:bg-white">
                                </div>
                            </div>

                            <!-- Message Title -->
                            <div class="sm:col-span-2">
                                <label class="block text-xs font-medium text-gray-500 mb-1.5">Message Title</label>
                                <div class="relative">
                                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><i class="fas fa-book text-xs"></i></span>
                                    <input type="text" id="usherMessage" placeholder="Enter message title" class="w-full pl-9 pr-4 py-2.5 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 focus:outline-none text-sm bg-gray-50 focus:bg-white">
                                </div>
                            </div>

                            <!-- Divider -->
                            <div class="sm:col-span-2 border-t border-gray-100 pt-5">
                                <p class="text-sm font-medium text-gray-700 mb-4"><i class="fas fa-coins text-primary mr-2"></i>Financial Contributions</p>
                            </div>

                            <!-- Tithe -->
                            <div>
                                <label class="block text-xs font-medium text-gray-500 mb-1.5">Tithe (₦)</label>
                                <div class="relative">
                                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><i class="fas fa-hand-holding-dollar text-xs"></i></span>
                                    <input type="number" id="usherTithe" min="0" step="0.01" placeholder="0.00" value="0" class="w-full pl-9 pr-4 py-2.5 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 focus:outline-none text-sm bg-gray-50 focus:bg-white finance-input">
                                </div>
                            </div>

                            <!-- Offering -->
                            <div>
                                <label class="block text-xs font-medium text-gray-500 mb-1.5">Offering (₦)</label>
                                <div class="relative">
                                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><i class="fas fa-gift text-xs"></i></span>
                                    <input type="number" id="usherOffering" min="0" step="0.01" placeholder="0.00" value="0" class="w-full pl-9 pr-4 py-2.5 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 focus:outline-none text-sm bg-gray-50 focus:bg-white finance-input">
                                </div>
                            </div>

                            <!-- Special Seed -->
                            <div>
                                <label class="block text-xs font-medium text-gray-500 mb-1.5">Special Seed (₦)</label>
                                <div class="relative">
                                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><i class="fas fa-seedling text-xs"></i></span>
                                    <input type="number" id="usherSeed" min="0" step="0.01" placeholder="0.00" value="0" class="w-full pl-9 pr-4 py-2.5 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 focus:outline-none text-sm bg-gray-50 focus:bg-white finance-input">
                                </div>
                            </div>

                            <!-- Total (auto) -->
                            <div>
                                <label class="block text-xs font-medium text-gray-500 mb-1.5">TOTAL (₦)</label>
                                <div class="relative">
                                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-primary"><i class="fas fa-calculator text-xs"></i></span>
                                    <input type="text" id="usherTotal" readonly class="w-full pl-9 pr-4 py-2.5 rounded-xl border-2 border-primary/30 bg-primary-light/20 text-primary font-bold text-sm focus:outline-none">
                                </div>
                            </div>

                            <!-- Upload -->
                            <div class="sm:col-span-2">
                                <label class="block text-xs font-medium text-gray-500 mb-1.5">Upload Document</label>
                                <div class="relative">
                                    <input type="file" id="usherUpload" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm file:mr-4 file:py-1.5 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-primary/10 file:text-primary hover:file:bg-primary/20 transition">
                                </div>
                            </div>
                        </div>

                        <!-- Submit -->
                        <div class="mt-6 flex gap-3">
                            <button type="submit" class="bg-primary hover:bg-primary-dark text-white px-6 py-2.5 rounded-xl text-sm font-semibold transition shadow-lg shadow-primary/25 hover:shadow-xl hover:shadow-primary/30 flex items-center gap-2">
                                <i class="fas fa-paper-plane"></i> Submit Report
                            </button>
                            <button type="reset" class="bg-white hover:bg-gray-50 text-gray-600 px-6 py-2.5 rounded-xl text-sm font-medium border border-gray-200 transition">
                                Reset
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Recent Submissions -->
                <div class="mt-8 bg-white rounded-2xl border border-gray-100 shadow-sm">
                    <div class="p-5 border-b border-gray-50">
                        <h3 class="font-semibold text-gray-900"><i class="fas fa-history text-primary mr-2"></i>Recent Submissions</h3>
                    </div>
                    <div id="recentUsherSubmissions" class="p-5">
                        <div class="text-center py-8 text-gray-400">
                            <i class="fas fa-inbox text-3xl mb-3"></i>
                            <p class="text-sm">No submissions yet</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/ushers-register.js"></script>
</body>
</html>
