<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance - JAGOM Church Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#059669',
                        'primary-light': '#d1fae5',
                        'primary-dark': '#047857',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/attendance.css">
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <!-- Mobile Header -->
    <header class="lg:hidden fixed top-0 left-0 right-0 z-40 bg-white border-b border-gray-100 px-4 h-14 flex items-center justify-between">
        <button id="sidebarToggle" class="w-10 h-10 rounded-lg hover:bg-gray-100 flex items-center justify-center transition">
            <i class="fas fa-bars text-gray-600"></i>
        </button>
        <div class="flex items-center gap-2">
            <div id="mobileLogo" class="w-8 h-8 rounded-lg overflow-hidden">
                <img src="image/jagomlog.png" alt="JAGOM Logo" class="w-full h-full object-cover">
            </div>
            <span class="font-bold text-gray-900">JAGOM</span>
        </div>
        <div class="w-10"></div>
    </header>

    <!-- Overlay -->
    <div id="overlay" class="fixed inset-0 bg-black/40 z-40 hidden lg:hidden transition-opacity"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed left-0 top-0 h-full w-64 bg-white border-r border-gray-100 z-50 transform -translate-x-full lg:translate-x-0 transition-transform duration-300">
        <div class="flex flex-col h-full">
            <div class="p-5 border-b border-gray-50">
                <div class="flex items-center gap-3">
                    <div id="sidebarLogo" class="w-10 h-10 rounded-xl overflow-hidden cursor-pointer" title="Click to upload logo">
                        <img src="image/jagomlog.png" alt="JAGOM Logo" class="w-full h-full object-cover">
                    </div>
                    <div>
                        <h2 class="font-bold text-gray-900 text-sm">JAGOM</h2>
                        <p class="text-xs text-gray-400">Church Management</p>
                    </div>
                </div>
                <input type="file" id="logoUpload" accept="image/*" class="hidden">
            </div>
            <nav class="flex-1 p-3 space-y-1">
                <a href="dashboard.html" class="nav-item flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium transition">
                    <i class="fas fa-house w-5 text-center"></i><span>Home</span>
                </a>
                <a href="attendance.html" class="nav-item active flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium transition">
                    <i class="fas fa-clipboard-check w-5 text-center"></i><span>Attendance</span>
                </a>
                <a href="ushers-register.html" class="nav-item flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium transition">
                    <i class="fas fa-people-group w-5 text-center"></i><span>Ushers Register</span>
                </a>
                <a href="finance.html" class="nav-item flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium transition">
                    <i class="fas fa-money-bill-wave w-5 text-center"></i><span>Finance</span>
                </a>
                <a href="superadmin.html" class="nav-item flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium transition">
                    <i class="fas fa-shield-halved w-5 text-center"></i><span>Super Admin</span>
                </a>
            </nav>
            <div class="p-3 border-t border-gray-50">
                <button id="logoutBtn" class="nav-item flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium w-full text-left transition text-red-500 hover:bg-red-50">
                    <i class="fas fa-right-from-bracket w-5 text-center"></i><span>Logout</span>
                </button>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="lg:ml-64 pt-14 lg:pt-0 min-h-screen">
        <div class="hidden lg:flex items-center justify-between px-8 py-4 border-b border-gray-100 bg-white">
            <div>
                <h1 class="text-lg font-bold text-gray-900">Attendance</h1>
                <p class="text-sm text-gray-400">Manage member registration and mark attendance</p>
            </div>
            <span class="text-xs font-medium px-3 py-1 rounded-full bg-primary/10 text-primary" id="roleBadge">Role</span>
        </div>

        <div class="p-4 sm:p-6 lg:p-8">
            <!-- Branch Filter (Super Admin Only) -->
            <div id="branchFilterSection" class="hidden mb-6">
                <div class="flex flex-wrap items-center gap-3">
                    <label class="text-sm font-medium text-gray-700">Filter Branch:</label>
                    <select id="branchFilter" class="px-4 py-2 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 focus:outline-none text-sm bg-white">
                        <option value="all">All Branches</option>
                    </select>
                </div>
            </div>

            <!-- Member Register -->
            <div class="bg-white rounded-2xl border border-gray-100 shadow-sm mb-8">
                <div class="p-5 border-b border-gray-50 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3">
                    <h3 class="font-semibold text-gray-900"><i class="fas fa-users text-primary mr-2"></i>Member Register</h3>
                    <button id="addMemberBtn" class="bg-primary hover:bg-primary-dark text-white px-4 py-2 rounded-xl text-sm font-medium transition shadow-sm">
                        <i class="fas fa-plus mr-1.5"></i>Add Member
                    </button>
                </div>

                <!-- Add Member Form (hidden by default) -->
                <div id="addMemberForm" class="hidden border-b border-gray-100 p-5 bg-gray-50">
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">Full Name</label>
                            <input type="text" id="memberName" placeholder="Enter full name" class="w-full px-3 py-2 rounded-lg border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 focus:outline-none text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">Phone Number</label>
                            <input type="tel" id="memberPhone" placeholder="Enter phone number" class="w-full px-3 py-2 rounded-lg border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 focus:outline-none text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">Unit</label>
                            <input type="text" id="memberUnit" placeholder="Enter unit" class="w-full px-3 py-2 rounded-lg border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 focus:outline-none text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">Branch</label>
                            <select id="memberBranch" class="w-full px-3 py-2 rounded-lg border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 focus:outline-none text-sm">
                            </select>
                        </div>
                    </div>
                    <div class="flex gap-3 mt-4">
                        <button id="saveMemberBtn" class="bg-primary hover:bg-primary-dark text-white px-4 py-2 rounded-lg text-sm font-medium transition">Save Member</button>
                        <button id="cancelMemberBtn" class="bg-white hover:bg-gray-50 text-gray-600 px-4 py-2 rounded-lg text-sm font-medium border border-gray-200 transition">Cancel</button>
                    </div>
                </div>

                <!-- Table -->
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="border-b border-gray-100">
                                <th class="text-left px-5 py-3 font-medium text-gray-500 text-xs uppercase tracking-wider">Name</th>
                                <th class="text-left px-5 py-3 font-medium text-gray-500 text-xs uppercase tracking-wider">Phone</th>
                                <th class="text-left px-5 py-3 font-medium text-gray-500 text-xs uppercase tracking-wider">Unit</th>
                                <th class="text-left px-5 py-3 font-medium text-gray-500 text-xs uppercase tracking-wider">Branch</th>
                            </tr>
                        </thead>
                        <tbody id="memberTableBody">
                        </tbody>
                    </table>
                </div>
                <div id="noMembers" class="text-center py-10 text-gray-400 hidden">
                    <i class="fas fa-users text-3xl mb-3"></i>
                    <p class="text-sm">No members registered yet</p>
                </div>
            </div>

            <!-- Mark Attendance -->
            <div class="bg-white rounded-2xl border border-gray-100 shadow-sm">
                <div class="p-5 border-b border-gray-50">
                    <h3 class="font-semibold text-gray-900"><i class="fas fa-clipboard-check text-primary mr-2"></i>Mark Attendance</h3>
                </div>
                <div class="p-5">
                    <form id="attendanceForm" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">Client Name</label>
                            <input type="text" id="attendeeName" placeholder="Enter name" class="w-full px-3 py-2.5 rounded-lg border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 focus:outline-none text-sm" required>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">Branch</label>
                            <select id="attendeeBranch" class="w-full px-3 py-2.5 rounded-lg border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 focus:outline-none text-sm">
                            </select>
                        </div>
                        <div class="flex items-end">
                            <button type="submit" class="w-full bg-primary hover:bg-primary-dark text-white px-4 py-2.5 rounded-lg text-sm font-medium transition shadow-sm shadow-primary/25">
                                <i class="fas fa-check mr-1.5"></i>Mark Present
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Attendance Records -->
                <div class="px-5 pb-5">
                    <div class="flex items-center justify-between mb-3">
                        <h4 class="text-sm font-medium text-gray-600">Today's Attendance</h4>
                        <span class="text-xs text-gray-400" id="todayCount">0 records</span>
                    </div>
                    <div id="attendanceList" class="space-y-2 max-h-64 overflow-y-auto">
                        <div class="text-center py-6 text-gray-400">
                            <p class="text-sm">No attendance records for today</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/attendance.js"></script>
</body>
</html>
